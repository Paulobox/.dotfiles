backend = "glx";
vsync = true;

opacity-rule = [
      "90:class_g = 'thorium-browser' && focused",
      "55:class_g = 'thorium-browser' && !focused",
      "70:class_g = 'kitty' && focused",
      "80:class_g = 'kitty' && !focused",
      "70:class_g = 'st-256color' && focused",
      "100:class_g = 'st-256color' && !focused"
];
